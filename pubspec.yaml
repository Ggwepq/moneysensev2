name: moneysensev2
description: "A bilingual, accessible Philippine currency identifier for visually impaired users."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Storage/Persistence
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # Camera
  camera: ^0.11.1

  vibration: ^2.0.0
  sensors_plus: ^6.1.1

  # TTS
  flutter_tts: ^4.2.3

  # Accessibility
  flutter_screenutil: ^5.9.3

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.1

  # UI Helpers
  gap: ^3.0.1

  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/audio/


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/moneysense-favicon.png"
  adaptive_icon_background: "#010F1C"
  adaptive_icon_foreground: "assets/images/moneysense-favicon.png"
  min_sdk_android: 21
